<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Minecraft Plugin Finder</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
color:#38bdf8;
margin-top:30px;
}

.search{
width:320px;
padding:12px;
border-radius:8px;
border:none;
margin-top:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{
background:#1e293b;
width:240px;
margin:10px;
padding:20px;
border-radius:10px;
}

.btn{
display:inline-block;
margin-top:12px;
padding:10px 15px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<h1>⚡ Minecraft Plugin Download</h1>

<input class="search" id="search" type="text" placeholder="Tìm plugin..." onkeyup="searchPlugin()">

<div class="container">

<div class="card">
<h3>EssentialsX</h3>
<p>Plugin SMP cơ bản</p>
<a class="btn" href="https://essentialsx.net/downloads.html" target="_blank">Download</a>
</div>

<div class="card">
<h3>LuckPerms</h3>
<p>Plugin quản lý quyền</p>
<a class="btn" href="https://luckperms.net/download" target="_blank">Download</a>
</div>

<div class="card">
<h3>WorldEdit</h3>
<p>Xây dựng map</p>
<a class="btn" href="https://modrinth.com/plugin/worldedit" target="_blank">Download</a>
</div>

<div class="card">
<h3>WorldGuard</h3>
<p>Bảo vệ khu vực</p>
<a class="btn" href="https://modrinth.com/plugin/worldguard" target="_blank">Download</a>
</div>

<div class="card">
<h3>PlaceholderAPI</h3>
<p>Hiển thị placeholder</p>
<a class="btn" href="https://www.spigotmc.org/resources/placeholderapi.6245/" target="_blank">Download</a>
</div>

<div class="card">
<h3>Vault</h3>
<p>Economy API</p>
<a class="btn" href="https://www.spigotmc.org/resources/vault.34315/" target="_blank">Download</a>
</div>

</div>

<script>

function searchPlugin(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();

if(text.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
